name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build-app.sh

      - name: Zip beacon.app
        run: zip -r beacon.app.zip beacon.app

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" beacon.app.zip --clobber
          else
            gh release create "${{ github.ref_name }}" \
              beacon.app.zip \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
